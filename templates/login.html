<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Identity Hub | RadiantAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#081018] text-white flex items-center justify-center min-h-screen">
    
    <div class="max-w-md w-full p-10 bg-[#0c1622] border border-white/5 rounded-3xl shadow-2xl">
        <div class="text-center mb-10">
            <div class="text-2xl font-black mb-2 tracking-tighter">RADIANT<span class="text-blue-500">AI</span></div>
            <p class="text-slate-400 text-sm italic">Clinical Authentication Gateway</p>
        </div>

        <form action="/login" method="POST" class="space-y-6">
            <input type="hidden" name="next_url" value="{{next_url}}">
            
            <div class="space-y-2">
                <label class="text-[10px] uppercase font-bold text-slate-500">Clinical Role</label>
                <select name="role" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:border-blue-500 focus:outline-none transition">
                    <option value="patient" class="bg-[#0c1622]">Patient Access</option>
                    <option value="doctor" class="bg-[#0c1622]">Consultant Access (SP Node)</option>
                </select>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] uppercase font-bold text-slate-500">Identity Name</label>
                <input type="text" name="name" required placeholder="Full Name or ID" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:border-blue-500 focus:outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-500">Age</label>
                    <input type="number" name="age" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:border-blue-500 focus:outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-500">Gender</label>
                    <select name="gender" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:border-blue-500 focus:outline-none">
                        <option value="Male" class="bg-[#0c1622]">Male</option>
                        <option value="Female" class="bg-[#0c1622]">Female</option>
                        <option value="Other" class="bg-[#0c1622]">Other</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] uppercase font-bold text-slate-500">System Password</label>
                <input type="password" name="password" required placeholder="Sentinel Keycard required" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:border-blue-500 focus:outline-none">
            </div>

            <button class="w-full bg-blue-600 py-4 rounded-xl font-black hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">Secure Login</button>
        </form>

        <p class="text-[10px] text-center text-slate-600 mt-10 uppercase tracking-widest">Sentinel Protection Active</p>
    </div>

</body>
</html>
