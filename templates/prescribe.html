<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Electronic Prescription | Sentinel SP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#081018] text-white font-sans flex items-center justify-center min-h-screen">
    
    <div class="max-w-2xl w-full p-10 bg-[#0c1622] border border-white/5 rounded-3xl shadow-2xl">
        <header class="mb-10 flex justify-between items-start">
            <div>
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest mb-1">Authenticated Consultant</p>
                <h1 class="text-3xl font-black">Issue Medication Order</h1>
            </div>
            <a href="/doctor" class="text-xs text-slate-500 hover:text-white transition">Cancel</a>
        </header>

        <form action="/issue_prescription" method="POST" class="space-y-8">
            <input type="hidden" name="patient_id" value="{{patient.id}}">
            <input type="hidden" name="patient_name" value="{{patient.patient_name}}">
            
            <div class="p-6 bg-blue-600/5 border border-blue-600/10 rounded-2xl grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] uppercase font-bold text-slate-500">Patient</label>
                    <p class="font-bold text-blue-400">{{patient.patient_name}}</p>
                </div>
                <div>
                    <label class="text-[9px] uppercase font-bold text-slate-500">Case Diagnosis</label>
                    <p class="font-bold text-blue-400">{{patient.result}}</p>
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-[10px] uppercase font-bold text-slate-500">Medication Regimen (Comma Separated)</label>
                <input type="text" name="medicines" required placeholder="e.g. Amoxicillin 500mg, Paracetamol" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-blue-500 focus:outline-none">
            </div>

            <div class="space-y-3">
                <label class="text-[10px] uppercase font-bold text-slate-500">Clinical Instructions</label>
                <textarea name="instructions" rows="4" placeholder="Enter dosage instructions and safety precautions..." class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-blue-500 focus:outline-none"></textarea>
            </div>

            <button class="w-full bg-blue-600 py-4 rounded-2xl text-lg font-black hover:bg-blue-500 transition shadow-lg shadow-blue-600/30">Authorize & Sign Order</button>
        </form>

        <p class="text-[9px] text-center text-slate-600 mt-8 uppercase tracking-widest italic">Digital Signatures Anchor to Sentinel Audit Ledger</p>
    </div>

</body>
</html>
